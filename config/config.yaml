# Server Configuration
server:
  host: "0.0.0.0"
  port: 8080
  mode: "debug" # debug, release, test
  read_timeout: 60s
  write_timeout: 60s

# Database Configuration
database:
  host: "localhost"
  port: 3306
  username: "root"
  password: "password"
  database: "hatesentry"
  charset: "utf8mb4"
  parse_time: true
  loc: "Local"
  max_idle_conns: 10
  max_open_conns: 100
  conn_max_lifetime: 3600s

# Redis Configuration
redis:
  host: "localhost"
  port: 6379
  password: ""
  db: 0
  pool_size: 100
  min_idle_conns: 10

# RabbitMQ Configuration
rabbitmq:
  host: "localhost"
  port: 5672
  username: "guest"
  password: "guest"
  vhost: "/"
  queue: "detection_tasks"
  exchange: "hatesentry"
  routing_key: "detection"

# JWT Configuration
jwt:
  secret: "your-secret-key-change-in-production"
  expire_hours: 24
  issuer: "hatesentry"

# AI Model Configuration
ai:
  provider: "openai" # openai, ollama
  openai:
    api_key: "your-openai-api-key"
    base_url: "https://api.openai.com/v1"
    model: "gpt-4-vision-preview"
    max_tokens: 1000
    temperature: 0.3
  ollama:
    base_url: "http://localhost:11434"
    model: "llava:13b"
    max_tokens: 1000
    temperature: 0.3

# Detection Configuration
detection:
  enable_image_analysis: true
  enable_text_analysis: true
  confidence_threshold: 0.7
  async_threshold: 5 # concurrent requests > 5, use async processing
  max_concurrent_requests: 100
  result_cache_ttl: 3600s

# Logging Configuration
logging:
  level: "info" # debug, info, warn, error
  format: "json" # json, console
  output: "stdout"
