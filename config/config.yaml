# Server Configuration
server:
  host: "0.0.0.0"
  port: 8080
  mode: "debug" # debug, release, test
  read_timeout: 60s
  write_timeout: 60s

# Database Configuration
database:
  host: "localhost"
  port: 3306
  username: "root"
  password: "password"
  database: "hatesentry"
  charset: "utf8mb4"
  parse_time: true
  loc: "Local"
  max_idle_conns: 10
  max_open_conns: 100
  conn_max_lifetime: 3600s

# Redis Configuration
redis:
  host: "localhost"
  port: 6379
  password: ""
  db: 0
  pool_size: 100
  min_idle_conns: 10

# RabbitMQ Configuration
rabbitmq:
  host: "localhost"
  port: 5672
  username: "guest"
  password: "guest"
  vhost: "/"
  queue: "detection_tasks"
  exchange: "hatesentry"
  routing_key: "detection"

# Auth Configuration
auth:
  # Required in the registration request only when creating the first admin user.
  # Keep empty until intentionally bootstrapping a fresh deployment.
  admin_bootstrap_token: ""

# JWT Configuration
jwt:
  secret: "dev-jwt-secret-change-me"
  expire_hours: 24
  issuer: "hatesentry"

# AI Model Configuration
ai:
  provider: "openai" # openai, ollama
  openai:
    api_key: "your-openai-api-key"
    base_url: "https://api.openai.com/v1"
    model: "gpt-4o-mini"
    max_tokens: 1000
    temperature: 0.3
  ollama:
    base_url: "http://localhost:11434"
    model: "llama3"
    max_tokens: 1000
    temperature: 0.3

# Legacy detection configuration.
# The current MVP path is text moderation under /api/v1/moderation/*.
# Image, batch, and async detection paths are retained for later validation.
detection:
  enable_image_analysis: false
  enable_text_analysis: true
  confidence_threshold: 0.7
  async_threshold: 5
  max_concurrent_requests: 100
  result_cache_ttl: 3600s

# Moderation Configuration
moderation:
  policy:
    version: "default-v1"
    review_threshold: 0.4
    block_threshold: 0.75
  policies:
    - version: "strict-v1"
      review_threshold: 0.2
      block_threshold: 0.5
  client_rate_limit:
    limit: 60
    window: 1m
  webhook_retry:
    enabled: true
    interval: 1m
    batch_size: 10
    max_attempts: 3

# Logging Configuration
logging:
  level: "info" # debug, info, warn, error
  format: "json" # json, console
  output: "stdout"
