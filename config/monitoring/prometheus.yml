# Prometheus 配置文件
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'hatesentry'
    environment: 'production'

# 告警管理器配置
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - 'alertmanager:9093'

# 告警规则文件
rule_files:
  - '/etc/prometheus/rules/*.yml'

# 采集配置
scrape_configs:
  # Prometheus 自监控
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          service: 'prometheus'
          instance: 'prometheus-1'

  # HateSentry 应用指标
  - job_name: 'hatesentry-app'
    static_configs:
      - targets: ['hatesentry:8080']
        labels:
          service: 'hatesentry-api'
          instance: 'api-1'
    metrics_path: '/metrics'
    scrape_interval: 10s

  # Node Exporter - 系统指标
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
        labels:
          service: 'node-exporter'
          instance: 'system-1'

  # cAdvisor - 容器指标
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
        labels:
          service: 'cadvisor'
          instance: 'docker-1'

  # MySQL 指标（使用 mysqld_exporter）
  - job_name: 'mysql'
    static_configs:
      - targets: ['mysql-exporter:9104']
        labels:
          service: 'mysql'
          instance: 'mysql-1'

  # Redis 指标（使用 redis_exporter）
  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']
        labels:
          service: 'redis'
          instance: 'redis-1'

  # RabbitMQ 指标（使用 rabbitmq_exporter）
  - job_name: 'rabbitmq'
    static_configs:
      - targets: ['rabbitmq-exporter:15692']
        labels:
          service: 'rabbitmq'
          instance: 'rabbitmq-1'

  # Elasticsearch 指标
  - job_name: 'elasticsearch'
    static_configs:
      - targets: ['elasticsearch:9114']
        labels:
          service: 'elasticsearch'
          instance: 'elasticsearch-1'
