server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # HateSentry 应用日志
  - job_name: hatesentry-app
    static_configs:
      - targets:
          - localhost
        labels:
          job: hatesentry
          instance: hatesentry-app
          __path__: /app/logs/*.log

  # 系统日志
  - job_name: system
    static_configs:
      - targets:
          - localhost
        labels:
          job: system
          instance: system
          __path__: /var/log/syslog

  # Docker 日志
  - job_name: docker
    static_configs:
      - targets:
          - localhost
        labels:
          job: docker
          instance: docker
          __path__: /var/lib/docker/containers/*/*-json.log
