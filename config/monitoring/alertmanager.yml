global:
  resolve_timeout: 5m

# 路由配置
route:
  group_by: ['alertname', 'cluster', 'service']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 12h
  receiver: 'default'

  # 子路由
  routes:
    # Critical 级别告警 - 立即通知
    - match:
        severity: critical
      receiver: 'critical-alerts'
      group_wait: 0s
      repeat_interval: 5m

    # Warning 级别告警
    - match:
        severity: warning
      receiver: 'warning-alerts'
      group_wait: 30s
      repeat_interval: 1h

    # 平台团队告警
    - match:
        team: platform
      receiver: 'platform-team'

    # 数据库团队告警
    - match:
        team: dba
      receiver: 'dba-team'

    # 安全团队告警
    - match:
        team: security
      receiver: 'security-team'

# 接收器配置
receivers:
  # 默认接收器
  - name: 'default'
    webhook_configs:
      - url: 'http://localhost:5000/alerts'
        send_resolved: true

  # Critical 告警接收器
  - name: 'critical-alerts'
    webhook_configs:
      - url: 'http://localhost:5000/alerts'
        send_resolved: true
    email_configs:
      - to: 'oncall@hatesentry.com'
        from: 'alertmanager@hatesentry.com'
        smarthost: 'smtp.gmail.com:587'
        auth_username: 'alertmanager@hatesentry.com'
        auth_password: 'your-password'
        headers:
          Subject: '[CRITICAL] {{ .GroupLabels.alertname }}'
    slack_configs:
      - api_url: 'https://hooks.slack.com/services/YOUR/SLACK/WEBHOOK'
        channel: '#alerts-critical'
        send_resolved: true
        title: '🚨 [CRITICAL] {{ .GroupLabels.alertname }}'
        text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'

  # Warning 告警接收器
  - name: 'warning-alerts'
    slack_configs:
      - api_url: 'https://hooks.slack.com/services/YOUR/SLACK/WEBHOOK'
        channel: '#alerts-warning'
        send_resolved: true
        title: '⚠️ [WARNING] {{ .GroupLabels.alertname }}'
        text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'

  # 平台团队接收器
  - name: 'platform-team'
    webhook_configs:
      - url: 'http://localhost:5000/alerts'
        send_resolved: true

  # 数据库团队接收器
  - name: 'dba-team'
    email_configs:
      - to: 'dba@hatesentry.com'
        from: 'alertmanager@hatesentry.com'
        smarthost: 'smtp.gmail.com:587'
        auth_username: 'alertmanager@hatesentry.com'
        auth_password: 'your-password'
        headers:
          Subject: '[DBA Alert] {{ .GroupLabels.alertname }}'

  # 安全团队接收器
  - name: 'security-team'
    webhook_configs:
      - url: 'http://localhost:5000/security-alerts'
        send_resolved: true
    slack_configs:
      - api_url: 'https://hooks.slack.com/services/YOUR/SLACK/WEBHOOK'
        channel: '#security-alerts'
        send_resolved: true
        title: '🔒 [SECURITY] {{ .GroupLabels.alertname }}'

# 抑制规则
inhibit_rules:
  # 如果应用宕机，抑制相关的应用级告警
  - source_match:
      alertname: 'ApplicationDown'
    target_match_re:
      alertname: '(HighErrorRate|HighLatency|VeryHighLatency)'
    equal: ['instance']

  # 如果数据库宕机，抑制相关的数据库告警
  - source_match:
      alertname: 'DatabaseDown'
    target_match_re:
      alertname: '(SlowDatabaseQueries|DatabaseConnectionPoolExhausted)'
    equal: ['instance']

  # 如果 Redis 宕机，抑制相关的缓存告警
  - source_match:
      alertname: 'CacheDown'
    target_match_re:
      alertname: '(LowCacheHitRate)'
    equal: ['instance']
