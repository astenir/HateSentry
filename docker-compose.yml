services:
  # HateSentry API
  hatesentry:
    build: .
    image: hatesentry:${APP_VERSION:-dev}
    container_name: hatesentry-api
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USERNAME=${DB_USERNAME:-hatesentry}
      - DB_PASSWORD=${DB_PASSWORD:-hatesentry}
      - DB_DATABASE=${DB_DATABASE:-hatesentry}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USERNAME=${RABBITMQ_USERNAME:-guest}
      - RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD:-guest}
      - SERVER_MODE=${SERVER_MODE:-debug}
      - APP_VERSION=${APP_VERSION:-dev}
      - ADMIN_BOOTSTRAP_TOKEN=${ADMIN_BOOTSTRAP_TOKEN:-}
      - JWT_SECRET=${JWT_SECRET:-dev-jwt-secret-change-me}
      - AI_PROVIDER=${AI_PROVIDER:-openai}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-your-openai-api-key}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://api.openai.com/v1}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://ollama:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3}
      - MODERATION_WEBHOOK_RETRY_ENABLED=${MODERATION_WEBHOOK_RETRY_ENABLED:-true}
      - MODERATION_WEBHOOK_RETRY_INTERVAL=${MODERATION_WEBHOOK_RETRY_INTERVAL:-1m}
      - MODERATION_WEBHOOK_RETRY_BATCH_SIZE=${MODERATION_WEBHOOK_RETRY_BATCH_SIZE:-10}
      - MODERATION_WEBHOOK_RETRY_MAX_ATTEMPTS=${MODERATION_WEBHOOK_RETRY_MAX_ATTEMPTS:-3}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - hatesentry-network
    restart: unless-stopped

  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: hatesentry-mysql
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-password}
      - MYSQL_DATABASE=${DB_DATABASE:-hatesentry}
      - MYSQL_USER=${DB_USERNAME:-hatesentry}
      - MYSQL_PASSWORD=${DB_PASSWORD:-hatesentry}
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - hatesentry-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: hatesentry-redis
    ports:
      - "127.0.0.1:6379:6379"
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
    command: >-
      sh -c 'if [ -n "$$REDIS_PASSWORD" ]; then
        exec redis-server --requirepass "$$REDIS_PASSWORD";
      else
        exec redis-server;
      fi'
    volumes:
      - redis-data:/data
    networks:
      - hatesentry-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "if [ -n \"$$REDIS_PASSWORD\" ]; then REDISCLI_AUTH=\"$$REDIS_PASSWORD\" redis-cli ping; else redis-cli ping; fi"]
      interval: 10s
      timeout: 5s
      retries: 5

  # RabbitMQ Message Queue
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: hatesentry-rabbitmq
    ports:
      - "127.0.0.1:5672:5672"
      - "127.0.0.1:15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_USERNAME:-guest}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASSWORD:-guest}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - hatesentry-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Optional local AI provider. Enable with:
  # COMPOSE_PROFILES=ollama AI_PROVIDER=ollama docker compose up -d --build
  ollama:
    profiles:
      - ollama
    image: ollama/ollama:latest
    container_name: hatesentry-ollama
    ports:
      - "11434:11434"
    environment:
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3}
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - hatesentry-network
    restart: unless-stopped
    entrypoint: ["/bin/sh", "-c"]
    command: >
      'set -e; ollama serve & until ollama list >/dev/null 2>&1; do sleep 1; done; ollama pull "$${OLLAMA_MODEL:-llama3}"; wait'
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Deterministic OpenAI-compatible provider used only by release smoke tests.
  openai-stub:
    profiles:
      - release-smoke
    image: python:3.13-alpine
    container_name: hatesentry-openai-stub
    environment:
      - PORT=8000
    volumes:
      - ./scripts/openai_stub_server.py:/app/openai_stub_server.py:ro
    networks:
      - hatesentry-network
    command: ["python", "/app/openai_stub_server.py"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2)"]
      interval: 2s
      timeout: 3s
      retries: 10

volumes:
  mysql-data:
  redis-data:
  rabbitmq-data:
  ollama-data:

networks:
  hatesentry-network:
    driver: bridge
